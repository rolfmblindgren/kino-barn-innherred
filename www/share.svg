      <stop offset='0%' stop-color='#102946'/>
      <stop offset='55%' stop-color='#176b5f'/>
      <stop offset='100%' stop-color='#ff6b6b'/>
    </linearGradient>
    <linearGradient id='glass' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#ffffff' stop-opacity='.18'/>
